name: Build Signed Android AAB

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install

      - name: Build Next.js Project
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          NEXT_PUBLIC_RAZORPAY_KEY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: Setup Java Development Environment
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Configure Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Create Capacitor Asset Directories
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res

      - name: Sync Capacitor Bridge Configuration
        run: npx cap sync android

      - name: Restore Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | tr -d '\n\r ' | base64 -d > android/app/release.keystore

      - name: Verify Keystore Exists
        run: |
          ls -lah android/app/
          test -f android/app/release.keystore && echo "Keystore Found"

      - name: Build Signed Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --info

      - name: Verify AAB Exists
        run: |
          ls -lah android/app/build/outputs/bundle/release/

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: blinkmaid-app-aab
          path: android/app/build/outputs/bundle/release/app-release.aab