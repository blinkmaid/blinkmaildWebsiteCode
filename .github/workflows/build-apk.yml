name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install

      - name: Create Web Distribution Directory
        run: mkdir -p out && touch out/index.html

      - name: Setup Java Development Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configure Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Bridge Configuration
        run: npx cap sync android

      - name: Compile Unsigned Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blinkmaid-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk